services:
  - type: web
    name: ps7-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    healthCheckPath: /health
    timeout: 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MODEL_PATH
        value: .
      - key: PORT
        value: 10000
    disk:
      name: model-storage
      mountPath: /opt/render/project/src
      sizeGB: 1